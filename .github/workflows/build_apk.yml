name: Build APK

permissions:
  contents: write

on:
  push:
    branches: [main]
    paths-ignore:
      - "*.md"
  workflow_dispatch:

jobs:
  detect_version:
    runs-on: ubuntu-latest
    outputs:
      version_changed: ${{ steps.check.outputs.version_changed }}
      app_version: ${{ steps.check.outputs.app_version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check pubspec version change
        id: check
        shell: bash
        run: |
          version=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          echo "app_version=${version}" >> "$GITHUB_OUTPUT"

          if [ "${{ github.event_name }}" != "push" ]; then
            echo "version_changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          before="${{ github.event.before }}"
          after="${{ github.sha }}"

          if [ "$before" = "0000000000000000000000000000000000000000" ]; then
            echo "version_changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if git diff --unified=0 "$before" "$after" -- pubspec.yaml | grep -qE '^\+version:'; then
            echo "version_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "version_changed=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: detect_version
    runs-on: ubuntu-latest

    steps:
      # 检出代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 设置 Java 17
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "adopt"
          java-version: "17"

      # 设置 Flutter 环境
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true

      # 缓存 Pub 依赖
      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      # 缓存 Gradle 依赖
      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            android/.gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # 安装依赖
      - name: Get dependencies
        run: flutter pub get

      # 构建并签名 APK
      - name: Build and Sign APK
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |

          cat > android/app/key.properties <<EOF
          storePassword=${KEYSTORE_PASSWORD}
          keyPassword=${KEY_PASSWORD}
          keyAlias=${KEY_ALIAS}
          storeFile=build.jks
          EOF

          echo "${KEYSTORE_BASE64}" | base64 --decode > android/app/build.jks

          flutter build apk --target-platform android-arm,android-arm64,android-x64 --split-per-abi --release

      # 上传 APKs
      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: apks
          path: build/app/outputs/flutter-apk/*.apk

  release:
    needs: [detect_version, build]
    if: needs.detect_version.outputs.version_changed == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download APKs
        uses: actions/download-artifact@v4
        with:
          name: apks
          path: dist

      - name: Create prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.detect_version.outputs.app_version }}
          name: v${{ needs.detect_version.outputs.app_version }}
          prerelease: true
          generate_release_notes: true
          files: dist/*.apk
